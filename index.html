<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinguaLink Translator 🌐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <header>
    <div class="logo">🌸 LinguaBuddy</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Settings ⚙️</a>
      <a href="#">Help ❓</a>
    </nav>
  </header>

  <!-- Main Translator Section -->
  <div class="container">
    <h1>Smart Language Translator</h1>
    <textarea id="inputText" placeholder="Type something to translate..."></textarea>

    <div class="selectors">
      <label>From:</label>
      <select id="sourceLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="kn">Kannada</option>
        <option value="ml">Malayalam</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>

      <label>To:</label>
      <select id="targetLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="kn">Kannada</option>
        <option value="ml">Malayalam</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <button onclick="translateText()">Translate ✨</button>
    <p id="outputText"></p>

    <div class="actions">
      <button onclick="copyText()">📋 Copy</button>
      <button onclick="speakText()">🔊 Speak</button>
    </div>
  </div>

  <footer>
    <p>© 2026 LinguaLink Translator | Made by Sanchitha 💫</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
